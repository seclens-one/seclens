# CI: build, test, and security static analysis for the public CLI assessor.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly dependency / vuln refresh (Monday 06:15 UTC)
    - cron: "15 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          check-latest: true
          cache: true

      - name: Go env
        run: go version && go env

      - name: Verify modules
        run: go mod verify && go mod tidy && git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 5m

      - name: Build
        run: go build -o seclens ./cmd/seclens

  security:
    name: Security (govulncheck, staticcheck, gosec)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          check-latest: true
          cache: true

      - name: Install tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: govulncheck
        run: govulncheck ./...

      - name: staticcheck
        run: staticcheck ./...

      - name: gosec
        # Fail the job on any finding (matches local "Issues: 0" bar).
        run: gosec -fmt text ./...
